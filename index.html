<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero Financiero</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #38bdf8; margin-bottom: 5px; font-size: 24px; }
        p.subtitle { text-align: center; color: #94a3b8; margin-top: 0; font-size: 14px; }
        
        .api-box {
            background: #334155;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .api-box label { display: block; font-size: 12px; color: #94a3b8; font-weight: bold; }
        .api-box input {
            width: 100%; padding: 8px; margin-top: 5px; background: #0f172a; border: 1px solid #475569;
            border-radius: 6px; color: #fff; box-sizing: border-box; font-size: 14px;
        }
        
        button {
            width: 100%; padding: 12px; background: #0ea5e9; color: white; border: none;
            border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        button:hover { background: #0284c7; }

        .ticker-list { margin-top: 20px; }
        .ticker-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid #334155;
        }
        .ticker-name { font-weight: bold; font-size: 16px; }
        .ticker-company { font-size: 12px; color: #94a3b8; display: block; }
        .ticker-price-box { text-align: right; }
        .ticker-price { font-weight: bold; font-size: 16px; }
        .ticker-change { font-size: 13px; font-weight: 500; margin-top: 2px; }
        
        .sube { color: #22c55e; }
        .baja { color: #ef4444; }
        .igual { color: #94a3b8; }
        
        #status { text-align: center; font-size: 12px; color: #94a3b8; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📈 Cotizaciones en Vivo</h1>
    <p class="subtitle">Tu Monitor Personal de Mercados</p>
    
    <div class="api-box">
        <label for="api-key">PEGÁ ACÁ TU API KEY DE FINNHUB:</label>
        <input type="text" id="api-key" placeholder="Pegá el código largo acá">
    </div>

    <button onclick="actualizarCotizaciones()">🔄 Actualizar Precios</button>
    <div id="status"></div>

    <div class="ticker-list" id="lista-precios">
        </div>
</div>

<script>
    // Lista de activos actualizada según tus indicaciones
    const activos = [
        { ticker: "AAPL", nombre: "Apple Inc." },
        { ticker: "MSFT", nombre: "Microsoft" },
        { ticker: "TSLA", nombre: "Tesla" },
        { ticker: "NVDA", nombre: "NVIDIA" },
        { ticker: "SPCX", nombre: "SpaceX" },
        { ticker: "META", nombre: "Meta Platforms" },
        { ticker: "SPY",  nombre: "S&P 500 ETF" },
        { ticker: "QQQ",  nombre: "Nasdaq 100 ETF" },
        { ticker: "GLD",  nombre: "Oro (ETF GLD)" },
        { ticker: "BINANCE:BTCUSDT", nombre: "Bitcoin" }
    ];

    window.onload = function() {
        if(localStorage.getItem('finnhub_key')) {
            document.getElementById('api-key').value = localStorage.getItem('finnhub_key');
            actualizarCotizaciones();
        } else {
            renderListaVacia();
        }
    };

    function renderListaVacia() {
        const lista = document.getElementById('lista-precios');
        lista.innerHTML = activos.map(a => `
            <div class="ticker-row">
                <div>
                    <span class="ticker-name">${a.ticker === 'BINANCE:BTCUSDT' ? 'BTC' : a.ticker}</span>
                    <span class="ticker-company">${a.nombre}</span>
                </div>
                <div class="ticker-price-box">
                    <span class="ticker-price">--</span>
                </div>
            </div>
        `).join('');
    }

    async function actualizarCotizaciones() {
        const apiKey = document.getElementById('api-key').value.trim();
        const status = document.getElementById('status');
        
        if (!apiKey) {
            alert("Por favor, poné tu API Key de Finnhub primero.");
            return;
        }

        localStorage.setItem('finnhub_key', apiKey);
        status.innerText = "Buscando precios del mercado...";

        const lista = document.getElementById('lista-precios');
        let htmlContenido = "";

        for (let a of activos) {
            try {
                const url = `https://finnhub.io/api/v1/quote?symbol=${a.ticker}&token=${apiKey}`;
                const respuesta = await fetch(url);
                const datos = await respuesta.json();

                const precio = datos.c;
                const cambioPorcentaje = datos.dp;

                if (precio === 0 || precio === null) {
                    throw new Error("Sin datos");
                }

                let claseColor = "igual";
                let signo = "";
                if (cambioPorcentaje > 0) { claseColor = "sube"; signo = "+"; }
                else if (cambioPorcentaje < 0) { claseColor = "baja"; }

                let tickerMostrar = a.ticker === 'BINANCE:BTCUSDT' ? 'BTC' : a.ticker;

                htmlContenido += `
                    <div class="ticker-row">
                        <div>
                            <span class="ticker-name">${tickerMostrar}</span>
                            <span class="ticker-company">${a.nombre}</span>
                        </div>
                        <div class="ticker-price-box">
                            <span class="ticker-price">U$S ${precio.toFixed(2)}</span>
                            <div class="ticker-change ${claseColor}">${signo}${cambioPorcentaje.toFixed(2)}%</div>
                        </div>
                    </div>
                `;
            } catch (error) {
                let tickerMostrar = a.ticker === 'BINANCE:BTCUSDT' ? 'BTC' : a.ticker;
                htmlContenido += `
                    <div class="ticker-row">
                        <div>
                            <span class="ticker-name">${tickerMostrar}</span>
                            <span class="ticker-company">${a.nombre}</span>
                        </div>
                        <div class="ticker-price-box">
                            <span class="ticker-price" style="color:#64748b;">Mercado Cerrado o Error</span>
                        </div>
                    </div>
                `;
            }
        }

        lista.innerHTML = htmlContenido;
        status.innerText = "Precios actualizados con éxito.";
    }
</script>
</body>
</html>
